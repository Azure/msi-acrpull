# This is the configuration file for the MSI-ACRPull Controller. These values will be passed to the helm chart.
# The config map is an easy way to provide an example of the configuration.
# The user must configure:
#   the controllerName and controllerNamespace parameters
#   the list of Audiences: they should have the format tokenAudience<user-defined-name>: 'audience'
apiVersion: v1
kind: ConfigMap
metadata:
  name: "admission-policies-msi-acrpull-controller-config"
data:
  controllerName: 'msi-acrpull-controller'
  controllerServiceAccountName: 'msi-acrpull-controller-manager'
  controllerNamespace: 'system'
  tokenAudience: 'api://AzureCRTokenExchange'